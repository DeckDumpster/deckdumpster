<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Batches - MTG Collection</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
}
header {
  background: #16213e;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 2px solid #0f3460;
}
header h1 { font-size: 1.1rem; color: #e94560; }
header a { color: #888; text-decoration: none; font-size: 0.8rem; }
header a:hover { color: #e94560; }
button {
  padding: 8px 16px;
  border: 1px solid #0f3460;
  border-radius: 6px;
  background: #e94560;
  border-color: #e94560;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  font-size: 0.9rem;
}
button:hover { background: #c73651; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
button.secondary { background: #333; border-color: #555; }
button.secondary:hover { background: #444; }
select, input {
  background: #1a1a2e;
  color: #e0e0e0;
  border: 1px solid #0f3460;
  border-radius: 4px;
  padding: 6px 8px;
  font-size: 0.85rem;
}
select:focus, input:focus { outline: 2px solid #e94560; }

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 4px;
  padding: 10px 12px;
  flex-wrap: wrap;
}
.filter-bar .pill {
  padding: 5px 14px;
  border: 1px solid #0f3460;
  border-radius: 16px;
  background: transparent;
  color: #888;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-bar .pill:hover { border-color: #e94560; color: #e0e0e0; }
.filter-bar .pill.active { background: #e94560; border-color: #e94560; color: #fff; }

/* List view */
#list-view { padding: 12px; }
.batch-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}
.batch-card {
  display: block;
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  color: inherit;
  text-decoration: none;
}
.batch-card:hover {
  border-color: #e94560;
  background: #1a1a3e;
}
.batch-card .batch-date { color: #888; font-size: 0.8rem; }
.batch-card .batch-count { color: #e94560; font-weight: 600; font-size: 1.1rem; }
.batch-card .batch-deck { color: #4caf50; font-size: 0.85rem; margin-top: 4px; }
.batch-card .batch-name { font-weight: 600; margin-bottom: 4px; }
.batch-card .batch-type-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 600;
  margin-left: 6px;
  vertical-align: middle;
}
.batch-card .batch-meta { color: #888; font-size: 0.8rem; margin-top: 2px; }
.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: #666;
}

@media (max-width: 768px) {
  .batch-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <h1>Batches</h1>
  <a href="/">Home</a>
  <a href="/collection">Collection</a>
  <a href="/orders">Orders</a>
</header>

<div class="filter-bar" id="type-filter">
  <span class="pill active" data-type="">All</span>
  <span class="pill" data-type="corner">Corner</span>
  <span class="pill" data-type="ocr">OCR</span>
  <span class="pill" data-type="csv_import">CSV Import</span>
  <span class="pill" data-type="manual_id">Manual ID</span>
</div>

<div id="list-view"></div>
<div id="messages"></div>

<script>
let batches = [];
let currentFilter = '';

const TYPE_LABELS = {
  corner: 'Corner',
  ocr: 'OCR',
  csv_import: 'CSV',
  manual_id: 'Manual',
};
const TYPE_COLORS = {
  corner: '#e94560',
  ocr: '#88c0d0',
  csv_import: '#a3be8c',
  manual_id: '#d08770',
};

document.querySelectorAll('#type-filter .pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('#type-filter .pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentFilter = pill.dataset.type;
    loadBatches();
  });
});

async function loadBatches() {
  const url = currentFilter ? `/api/batches?type=${currentFilter}` : '/api/batches';
  const resp = await fetch(url);
  batches = await resp.json();
  renderList();
}

function renderList() {
  const view = document.getElementById('list-view');

  if (batches.length === 0) {
    view.innerHTML = '<div class="empty-state">No batches yet. Import cards via CSV, corners, or manual ID to create batches.</div>';
    return;
  }

  let html = '<div class="batch-grid">';
  for (const b of batches) {
    const date = b.created_at ? new Date(b.created_at).toLocaleString() : 'Unknown';
    const deckLabel = b.deck_name ? `Deck: ${b.deck_name}` : '';
    const name = b.name || `Batch #${b.id}`;
    const typeLabel = TYPE_LABELS[b.batch_type] || b.batch_type;
    const typeColor = TYPE_COLORS[b.batch_type] || '#888';

    let metaParts = [];
    if (b.product_type) metaParts.push(b.product_type.replace(/_/g, ' '));
    if (b.set_code) metaParts.push(b.set_code.toUpperCase());

    html += `
      <a class="batch-card" href="/batches/${b.id}">
        <div class="batch-name">${esc(name)}<span class="batch-type-badge" style="background:${typeColor}33;color:${typeColor}">${typeLabel}</span></div>
        <div class="batch-date">${esc(date)}</div>
        <div class="batch-count">${b.card_count} card(s)</div>
        ${metaParts.length ? `<div class="batch-meta">${esc(metaParts.join(' / '))}</div>` : ''}
        ${deckLabel ? `<div class="batch-deck">${esc(deckLabel)}</div>` : ''}
      </a>`;
  }
  html += '</div>';
  view.innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : s;
  return d.innerHTML;
}

loadBatches();
</script>
</body>
</html>
