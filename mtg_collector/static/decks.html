<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="/static/vendor/mana-font/mana.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decks</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
}

header {
  background: #16213e;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  border-bottom: 2px solid #0f3460;
}

header h1 {
  font-size: 1.3rem;
  color: #e94560;
  margin-right: 16px;
  white-space: nowrap;
}

header h1 a { color: inherit; text-decoration: none; }
header h1 a:hover { text-decoration: underline; }

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

input[type="text"], input[type="number"], select, button, textarea {
  padding: 8px 14px;
  border: 1px solid #0f3460;
  border-radius: 6px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.9rem;
}

textarea { font-family: inherit; resize: vertical; }
input:focus, select:focus, textarea:focus { outline: 2px solid #e94560; }

button {
  background: #e94560;
  border-color: #e94560;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
}
button:hover { background: #c73651; }
button.secondary {
  background: #333;
  border-color: #555;
}
button.secondary:hover { background: #e94560; border-color: #e94560; }
button.danger { background: #c0392b; border-color: #c0392b; }
button.danger:hover { background: #a93226; }

#status {
  font-size: 0.85rem;
  color: #888;
  margin-left: auto;
}

main { padding: 24px; }

/* Deck grid */
.deck-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin-top: 8px;
}

.deck-card {
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 10px;
  padding: 20px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.deck-card:hover {
  border-color: #e94560;
  background: #1a1a3e;
}

.deck-card h3 { color: #e94560; margin-bottom: 8px; font-size: 1.1rem; }
.deck-card h3 a { color: inherit; text-decoration: none; }
.deck-card h3 a:visited { color: inherit; }
.deck-card h3 a:hover { text-decoration: underline; }

.deck-card .meta {
  font-size: 0.85rem;
  color: #888;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.deck-card .meta .badge {
  display: inline-block;
  background: #0f3460;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  color: #e0e0e0;
}

.deck-card .meta .badge.precon { background: #8e44ad; }
.deck-card .meta .badge.state-idea { background: #5c4d8a; }
.deck-card .meta .badge.state-ready { background: #2980b9; }
.deck-card .meta .badge.state-constructed { background: #27ae60; }

.deck-card .stats {
  margin-top: 12px;
  font-size: 0.9rem;
  display: flex;
  gap: 16px;
}

.deck-card .stats span { color: #e0e0e0; }

.deck-mana { display: flex; gap: 2px; align-items: center; }
.deck-mana .ms { font-size: 0.9rem; }

.deck-links {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid #0f3460;
  display: flex;
  gap: 12px;
}
.deck-links a {
  font-size: 0.8rem;
  color: #e94560;
  text-decoration: none;
  padding: 3px 10px;
  border: 1px solid #e94560;
  border-radius: 4px;
  transition: background 0.15s, color 0.15s;
}
.deck-links a:hover { background: #e94560; color: #fff; }

/* Modal */
.modal-backdrop {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
.modal-backdrop.active { display: flex; }
.modal {
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 12px;
  padding: 24px;
  width: 500px;
  max-width: 90vw;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 { color: #e94560; margin-bottom: 16px; }
.modal .form-group {
  margin-bottom: 12px;
}
.modal .form-group label {
  display: block;
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 4px;
}
.modal .form-group input,
.modal .form-group select,
.modal .form-group textarea {
  width: 100%;
}
.modal .form-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

/* Format sections */
.format-section { margin-bottom: 32px; }
.format-header {
  font-size: 1.2rem;
  color: #e94560;
  margin-bottom: 4px;
  padding-bottom: 8px;
  border-bottom: 1px solid #0f3460;
}
.format-header .format-count {
  font-size: 0.85rem;
  color: #888;
  font-weight: normal;
}

.deck-plan {
  font-style: italic;
  color: #aaa;
  font-size: 0.85rem;
  line-height: 1.3;
}

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: #888;
  font-size: 1.1rem;
}

/* View toggle */
.view-toggle-group {
  display: flex;
}
.view-toggle-group button.secondary {
  border-radius: 0;
  padding: 6px 10px;
}
.view-toggle-group button.secondary:first-child {
  border-radius: 6px 0 0 6px;
}
.view-toggle-group button.secondary:not(:first-child) {
  margin-left: -1px;
}
.view-toggle-group button.secondary:last-child {
  border-radius: 0 6px 6px 0;
}
.view-toggle-group button.secondary.active {
  z-index: 1;
  position: relative;
  border-color: #e94560;
  background: #e94560;
  color: #fff;
}
.view-toggle-group button svg { display: block; }

/* Deck table */
.deck-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 8px;
}
.deck-table th, .deck-table td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid #0f3460;
  font-size: 0.9rem;
}
.deck-table th {
  background: #16213e;
  color: #888;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.deck-table th:hover { color: #e0e0e0; }
.deck-table th .sort-arrow { margin-left: 4px; font-size: 0.7rem; }
.deck-table tr:hover td { background: #1a1a3e; }
.deck-table td a { color: #e94560; text-decoration: none; }
.deck-table td a:hover { text-decoration: underline; }
.deck-table .deck-mana { justify-content: flex-start; }
.deck-table .notes-col {
  color: #aaa;
  font-size: 0.85rem;
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Precon origin fields */
.precon-fields { margin-top: 8px; padding-left: 20px; }
</style>
</head>
<body>
<header>
  <h1><a href="/">MTG</a> / Decks</h1>
  <div class="controls" id="list-controls">
    <select id="status-filter" onchange="renderDeckList()">
      <option value="">All states</option>
      <option value="idea">Idea</option>
      <option value="ready">Ready</option>
      <option value="constructed">Constructed</option>
    </select>
    <div class="view-toggle-group">
      <button class="secondary" id="view-grid-btn" title="Card view"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg></button>
      <button class="secondary" id="view-table-btn" title="Table view"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2" rx=".5"/><rect x="1" y="7" width="14" height="2" rx=".5"/><rect x="1" y="12" width="14" height="2" rx=".5"/></svg></button>
    </div>
    <button onclick="showCreateModal()">New Deck</button>
  </div>
  <span id="status"></span>
</header>

<main>
  <!-- List View -->
  <div id="list-view" class="list-view active">
    <div id="deck-grid"></div>
    <div id="empty-state" class="empty-state" style="display:none">
      No decks yet. Click "New Deck" to create one.
    </div>
  </div>

</main>

<!-- Create/Edit Modal -->
<div class="modal-backdrop" id="deck-modal">
  <div class="modal">
    <h3 id="modal-title">New Deck</h3>
    <div class="form-group">
      <label>Name *</label>
      <input type="text" id="f-name" placeholder="My Commander Deck">
    </div>
    <div class="form-group">
      <label>Format</label>
      <select id="f-format">
        <option value="">-- None --</option>
        <option value="commander">Commander / EDH</option>
        <option value="jumpstart">Jumpstart</option>
        <option value="standard">Standard</option>
        <option value="modern">Modern</option>
        <option value="pioneer">Pioneer</option>
        <option value="legacy">Legacy</option>
        <option value="vintage">Vintage</option>
        <option value="pauper">Pauper</option>
      </select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="f-description" rows="2"></textarea>
    </div>
    <div class="form-group">
      <label>State</label>
      <select id="f-deck-state">
        <option value="idea">Idea</option>
        <option value="ready">Ready</option>
        <option value="constructed">Constructed</option>
      </select>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="f-precon" onchange="togglePreconFields()"> Preconstructed deck</label>
    </div>
    <div class="precon-fields" id="precon-fields" style="display:none">
      <div class="form-group">
        <label>Origin Set</label>
        <select id="f-origin-set">
          <option value="">-- None --</option>
          <option value="jmp">Jumpstart (JMP)</option>
          <option value="j22">Jumpstart 2022 (J22)</option>
          <option value="j25">Jumpstart 2025 (J25)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Theme</label>
        <input type="text" id="f-origin-theme" placeholder="e.g. Goblins, Angels">
      </div>
      <div class="form-group">
        <label>Variation</label>
        <input type="number" id="f-origin-variation" min="1" max="4" placeholder="1-4">
      </div>
    </div>
    <div class="form-group">
      <label>Sleeve Color</label>
      <input type="text" id="f-sleeve" placeholder="e.g. black dragon shield matte">
    </div>
    <div class="form-group">
      <label>Deck Box</label>
      <input type="text" id="f-deckbox" placeholder="e.g. Ultimate Guard Boulder 100+">
    </div>
    <div class="form-group">
      <label>Storage Location</label>
      <input type="text" id="f-location" placeholder="e.g. shelf 2, left side">
    </div>
    <div class="form-actions">
      <button onclick="saveDeck()">Save</button>
      <button class="secondary" onclick="closeModal('deck-modal')">Cancel</button>
    </div>
  </div>
</div>

<script>
let decks = /*INIT_DATA*/;
let viewMode = localStorage.getItem('decks-view') || 'grid';
let sortCol = 'name';
let sortAsc = true;

// ===== View Toggle =====

function setView(mode) {
  viewMode = mode;
  localStorage.setItem('decks-view', mode);
  document.getElementById('view-grid-btn').classList.toggle('active', mode === 'grid');
  document.getElementById('view-table-btn').classList.toggle('active', mode === 'table');
  renderDeckList();
}

document.getElementById('view-grid-btn').addEventListener('click', () => setView('grid'));
document.getElementById('view-table-btn').addEventListener('click', () => setView('table'));

// ===== List View =====

function loadDecks() {
  setView(viewMode);
}

const STATE_LABELS = {
  'idea': 'Idea',
  'ready': 'Ready',
  'constructed': 'Constructed',
};

const STATE_ORDER = ['idea', 'ready', 'constructed'];

function getCardCount(d) {
  const st = d.state || 'idea';
  const isVirtual = st !== 'constructed';
  return isVirtual && d.card_count === 0 && d.expected_card_count ? d.expected_card_count : d.card_count;
}

function getNotes(d) {
  const text = d.plan || d.description || '';
  if (!text) return '';
  const words = text.split(/\s+/);
  return words.length > 25 ? words.slice(0, 25).join(' ') + '...' : text;
}

function renderDeckList() {
  const grid = document.getElementById('deck-grid');
  const empty = document.getElementById('empty-state');
  const statusFilter = document.getElementById('status-filter').value;

  let filtered = decks;
  if (statusFilter) {
    filtered = decks.filter(d => (d.state || 'idea') === statusFilter);
  }

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    empty.textContent = statusFilter
      ? `No ${STATE_LABELS[statusFilter].toLowerCase()} decks.`
      : 'No decks yet. Click "New Deck" to create one.';
    return;
  }
  empty.style.display = 'none';

  if (viewMode === 'table') {
    renderTable(filtered);
  } else {
    renderGrid(filtered);
  }
}

// ===== Table View =====

function sortDecks(list) {
  const cmp = (a, b) => {
    let va, vb;
    switch (sortCol) {
      case 'name': va = (a.name || '').toLowerCase(); vb = (b.name || '').toLowerCase(); break;
      case 'colors': va = a.deck_colors || ''; vb = b.deck_colors || ''; break;
      case 'format': va = (a.format || '').toLowerCase(); vb = (b.format || '').toLowerCase(); break;
      case 'cards': va = getCardCount(a); vb = getCardCount(b); break;
      case 'notes': va = getNotes(a).toLowerCase(); vb = getNotes(b).toLowerCase(); break;
      default: va = ''; vb = '';
    }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  };
  return [...list].sort(cmp);
}

function onSort(col) {
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
  renderDeckList();
}

function sortArrow(col) {
  if (sortCol !== col) return '';
  return `<span class="sort-arrow">${sortAsc ? '\u25B2' : '\u25BC'}</span>`;
}

function renderTable(filtered) {
  const cols = [
    { key: 'name', label: 'Name' },
    { key: 'colors', label: 'Colors' },
    { key: 'format', label: 'Format' },
    { key: 'cards', label: 'Cards' },
    { key: 'notes', label: 'Notes' },
  ];

  // Group by state, then sort within each group
  const byState = {};
  for (const d of filtered) {
    const st = d.state || 'idea';
    if (!byState[st]) byState[st] = [];
    byState[st].push(d);
  }

  let html = '';
  for (const state of STATE_ORDER) {
    if (!byState[state]) continue;
    const sorted = sortDecks(byState[state]);
    const stateCount = sorted.length;

    html += `<div class="format-section">
      <h2 class="format-header">${esc(STATE_LABELS[state])} <span class="format-count">(${stateCount})</span></h2>`;
    html += '<table class="deck-table"><thead><tr>';
    for (const c of cols) {
      html += `<th data-col="${c.key}">${esc(c.label)}${sortArrow(c.key)}</th>`;
    }
    html += '</tr></thead><tbody>';
    for (const d of sorted) {
      const fmt = d.format ? d.format.charAt(0).toUpperCase() + d.format.slice(1) : '';
      html += `<tr>
        <td><a href="/decks/${d.id}">${esc(d.name)}</a></td>
        <td>${d.deck_colors ? `<span class="deck-mana">${renderDeckColors(d)}</span>` : ''}</td>
        <td>${esc(fmt)}</td>
        <td>${getCardCount(d)}</td>
        <td class="notes-col" title="${esc(d.plan || d.description || '')}">${esc(getNotes(d))}</td>
      </tr>`;
    }
    html += '</tbody></table></div>';
  }

  const grid = document.getElementById('deck-grid');
  grid.innerHTML = html;

  // Attach sort handlers
  grid.querySelectorAll('.deck-table th').forEach(th => {
    th.addEventListener('click', () => onSort(th.dataset.col));
  });
}

// ===== Grid View =====

function renderGrid(filtered) {
  const formatLabels = {
    'commander': 'Commander',
    'jumpstart': 'Jumpstart',
  };
  const formatOrder = ['commander', 'jumpstart', null];

  function sortFormats(keys) {
    return keys.sort((a, b) => {
      const ai = formatOrder.indexOf(a === 'null' ? null : a);
      const bi = formatOrder.indexOf(b === 'null' ? null : b);
      const aIdx = ai >= 0 ? ai : (a ? formatOrder.length - 0.5 : 999);
      const bIdx = bi >= 0 ? bi : (b ? formatOrder.length - 0.5 : 999);
      if (aIdx !== bIdx) return aIdx - bIdx;
      return (a || '').localeCompare(b || '');
    });
  }

  const byState = {};
  for (const d of filtered) {
    const st = d.state || 'idea';
    if (!byState[st]) byState[st] = {};
    const fmt = d.format || null;
    if (!byState[st][fmt]) byState[st][fmt] = [];
    byState[st][fmt].push(d);
  }

  let html = '';
  for (const state of STATE_ORDER) {
    if (!byState[state]) continue;
    const fmtGroups = byState[state];
    const stateCount = Object.values(fmtGroups).reduce((s, arr) => s + arr.length, 0);

    html += `<div class="format-section">
      <h2 class="format-header">${esc(STATE_LABELS[state])} <span class="format-count">(${stateCount})</span></h2>`;

    const fmtKeys = sortFormats(Object.keys(fmtGroups));
    for (const fk of fmtKeys) {
      const groupDecks = fmtGroups[fk];
      const fmtLabel = fk && fk !== 'null' ? (formatLabels[fk] || fk.charAt(0).toUpperCase() + fk.slice(1)) : 'Other';
      if (fmtKeys.length > 1 || (fk && fk !== 'null')) {
        html += `<h3 style="color:#888;font-size:0.9rem;margin:12px 0 4px;padding-left:4px">${esc(fmtLabel)}</h3>`;
      }
      html += `<div class="deck-grid">`;
      html += groupDecks.map(d => renderDeckCard(d)).join('');
      html += `</div>`;
    }
    html += `</div>`;
  }
  document.getElementById('deck-grid').innerHTML = html;
}

function renderDeckCard(d) {
  const st = d.state || 'idea';
  const cardCount = getCardCount(d);
  return `
    <div class="deck-card">
      <h3><a href="/decks/${d.id}">${esc(d.name)}</a></h3>
      <div class="meta">
        ${d.deck_colors ? `<span class="deck-mana">${renderDeckColors(d)}</span>` : ''}
        ${d.is_precon ? '<span><span class="badge precon">Precon</span></span>' : ''}
        <span><span class="badge state-${st}">${esc(STATE_LABELS[st] || st)}</span></span>
        ${d.format ? `<span><span class="badge">${esc(d.format)}</span></span>` : ''}
        ${d.storage_location ? `<span>${esc(d.storage_location)}</span>` : ''}
        ${d.plan ? `<span class="deck-plan">${esc(d.plan)}</span>` : ''}
        ${!d.plan && d.description ? `<span>${esc(d.description)}</span>` : ''}
      </div>
      <div class="stats">
        <span>${cardCount} cards</span>
        ${d.total_value ? `<span>$${Number(d.total_value).toFixed(2)}</span>` : ''}
      </div>
      <div class="deck-links">
        <a href="/decks/${d.id}">View</a>
      </div>
    </div>`;
}

// ===== Create Deck =====

function showCreateModal() {
  document.getElementById('modal-title').textContent = 'New Deck';
  document.getElementById('f-name').value = '';
  document.getElementById('f-format').value = '';
  document.getElementById('f-description').value = '';
  document.getElementById('f-deck-state').value = 'idea';
  document.getElementById('f-precon').checked = false;
  document.getElementById('f-origin-set').value = '';
  document.getElementById('f-origin-theme').value = '';
  document.getElementById('f-origin-variation').value = '';
  document.getElementById('precon-fields').style.display = 'none';
  document.getElementById('f-sleeve').value = '';
  document.getElementById('f-deckbox').value = '';
  document.getElementById('f-location').value = '';
  document.getElementById('deck-modal').classList.add('active');
}

async function saveDeck() {
  const data = {
    name: document.getElementById('f-name').value.trim(),
    format: document.getElementById('f-format').value || null,
    description: document.getElementById('f-description').value.trim() || null,
    state: document.getElementById('f-deck-state').value,
    is_precon: document.getElementById('f-precon').checked,
    sleeve_color: document.getElementById('f-sleeve').value.trim() || null,
    deck_box: document.getElementById('f-deckbox').value.trim() || null,
    storage_location: document.getElementById('f-location').value.trim() || null,
    origin_set_code: document.getElementById('f-origin-set').value || null,
    origin_theme: document.getElementById('f-origin-theme').value.trim() || null,
    origin_variation: document.getElementById('f-origin-variation').value ? parseInt(document.getElementById('f-origin-variation').value) : null,
  };
  if (!data.name) { alert('Name is required'); return; }

  const res = await fetch('/api/decks', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  const result = await res.json();
  closeModal('deck-modal');
  window.location.href = '/decks/' + result.id;
}

function togglePreconFields() {
  const show = document.getElementById('f-precon').checked;
  document.getElementById('precon-fields').style.display = show ? '' : 'none';
}

// ===== Utils =====

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function renderDeckColors(deck) {
  const colorsStr = deck.deck_colors;
  if (!colorsStr) return '';
  const valid = ['W', 'U', 'B', 'R', 'G'];
  // Format: "R:12,B:8,G:3" — already sorted by count desc from SQL
  const entries = colorsStr.split(',')
    .map(s => { const [c, n] = s.split(':'); return [c, parseInt(n) || 1]; })
    .filter(([c]) => valid.includes(c));
  if (!entries.length) return '';
  const maxCount = entries[0][1];
  return entries.map(([color, count]) => {
    const ratio = maxCount > 1 ? (count - 1) / (maxCount - 1) : 1;
    const size = (0.7 + ratio * 0.5).toFixed(2);
    return `<i class="ms ms-${color.toLowerCase()} ms-cost ms-shadow" style="font-size:${size}rem"></i>`;
  }).join('');
}

// Close modals on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('active');
  });
});

// Init
loadDecks();
</script>
</body>
