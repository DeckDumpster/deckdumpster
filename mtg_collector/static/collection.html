// --- Fetch ---
function getFetchParams() {
  const params = new URLSearchParams();
  if (_sharedCards) {
    params.set('cards', _sharedCards);
    return params.toString();
  }
  const q = searchInput.value.trim();
  if (q) params.set('q', q);
  if (multiSelectMode) {
    params.set('expand', 'copies');
  }
  return params.toString();
}

function applyClientSort(cards) {
  const sortKey = COL_SORT_MAP[sortColumn] || 'name';
  const dir = sortOrder === 'desc' ? -1 : 1;

  cards.sort((a, b) => {
    let va, vb;
    switch (sortKey) {
      case 'name': va = (a.name || '').toLowerCase(); vb = (b.name || '').toLowerCase(); break;
      case 'cmc': va = a.cmc || 0; vb = b.cmc || 0; break;
      case 'rarity': {
        const rm = {common:0, uncommon:1, rare:2, mythic:3};
        va = rm[a.rarity] ?? 4; vb = rm[b.rarity] ?? 4; break;
      }
      case 'set': va = a.set_code || ''; vb = b.set_code || ''; break;
      case 'color': va = a.color_identity || '[]'; vb = b.color_identity || '[]'; break;
      case 'qty': va = a.qty || 0; vb = b.qty || 0; break;
      case 'collector_number': va = parseInt(a.collector_number) || 0; vb = parseInt(b.collector_number) || 0; break;
      case 'date_added': va = a.acquired_at || ''; vb = b.acquired_at || ''; break;
      case 'price': {
        const pf = ((_settings.price_sources || 'tcg,ck').split(',')[0] === 'ck') ? 'ck_price' : 'tcg_price';
        va = parseFloat(a[pf]) || 0; vb = parseFloat(b[pf]) || 0; break;
      }
      default:
        // Price columns
        if (sortKey === 'tcg_price' || sortColumn === 'tcg_price') { va = parseFloat(a.tcg_price) || 0; vb = parseFloat(b.tcg_price) || 0; }
        else if (sortKey === 'ck_price' || sortColumn === 'ck_price') { va = parseFloat(a.ck_price) || 0; vb = parseFloat(b.ck_price) || 0; }
        else { va = (a.name || '').toLowerCase(); vb = (b.name || '').toLowerCase(); }
    }
    if (va < vb) return -1 * dir;
    if (va > vb) return 1 * dir;
    // Secondary sort by name
    const na = (a.name || '').toLowerCase(), nb = (b.name || '').toLowerCase();
    return na < nb ? -1 : na > nb ? 1 : 0;
  });
  return cards;
}

function refilterAndRender() {
  allCards = applyClientSort([...allCardsUnfiltered]);
  updateStatusText();
  render();
  serializeFiltersToURL();
}

function updateStatusText() {
  const sources = (_settings.price_sources || 'tcg,ck').split(',');
  const priceField = sources[0] === 'ck' ? 'ck_price' : 'tcg_price';
  const totalQty = allCards.reduce((s, c) => s + (c.qty || 0), 0);
  const totalValue = allCards.reduce((s, c) => {
    const p = parseFloat(c[priceField]) || 0;
    return s + p * (c.qty || 0);
  }, 0);
  // Owned queries: count by qty ("45 cards"). Unowned queries: count by row
  // ("3 results") since qty is always 0 for cards not in the collection.
  const useQty = totalQty > 0;
  const count = useQty ? totalQty : allCards.length;
  const noun = useQty ? (count === 1 ? 'card' : 'cards') : (count === 1 ? 'result' : 'results');
  const valueSuffix = totalValue > 0 ? `, $${totalValue.toFixed(2)}` : '';
  statusEl.textContent = `${count.toLocaleString()} ${noun}${valueSuffix}`;
  statusEl.classList.toggle('empty', allCards.length === 0);
}

function renderSkeleton() {
  const visCols = getVisibleColumns();
  let html = '<table class="collection-table"><thead><tr>';
  for (const col of visCols) html += `<th>${col.label}</th>`;
  html += '</tr></thead><tbody>';
  for (let i = 0; i < 20; i++) {
    html += '<tr class="skeleton-row">';
    for (const col of visCols) {
      if (col.key === 'name') html += '<td><div class="skeleton-cell thumb"></div><div class="skeleton-cell wide"></div></td>';
      else html += '<td><div class="skeleton-cell narrow"></div></td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  main.innerHTML = html;
}

async function fetchCollection() {
  searchErrorEl.textContent = '';
  statusEl.textContent = 'Loading...';
  if (allCardsUnfiltered.length === 0 && currentView === 'table') renderSkeleton();

  const params = getFetchParams();
  const res = await fetch(`/api/collection?${params}`);
  const data = await res.json();

  if (data.error) {
    searchErrorEl.textContent = data.error;
    statusEl.textContent = `Search error: ${data.error}`;
    allCardsUnfiltered = [];
  } else {
    allCardsUnfiltered = Array.isArray(data) ? data : [];
  }

  selectedCards.clear();
  lastSelectedIdx = null;
  updateSelectionBar();

  allCards = applyClientSort([...allCardsUnfiltered]);
  updateStatusText();
  render();
  serializeFiltersToURL();
}

// --- Render ---
function render() {
  if (_tableScrollCleanup && currentView !== 'table') {
    _tableScrollCleanup(); _tableScrollCleanup = null;
  }
  if (_gridScrollCleanup && currentView !== 'grid') {
    _gridScrollCleanup(); _gridScrollCleanup = null;
  }
  if (currentView === 'table') renderTable();
  else renderGrid();
}

function renderTable() {
  if (_tableScrollCleanup) { _tableScrollCleanup(); _tableScrollCleanup = null; }

  const savedScrollX = window.scrollX;

  if (allCards.length === 0) {
    main.innerHTML = '<div class="empty-state">No cards found</div>';
    return;
  }

  const visCols = getVisibleColumns();
  let rowHeight = 49; // initial estimate, measured after first render
  const bufferRows = 5;
  const totalRows = allCards.length;
  const colCount = visCols.length + (multiSelectMode ? 1 : 0);
  const _cellOpts = { priceSources: _settings.price_sources };

  let theadHtml = '<tr>';
  if (multiSelectMode) {
    const allChecked = selectedCards.size === allCards.length && allCards.length > 0;
    theadHtml += `<th class="select-col"><input type="checkbox" class="sel-all-cb" ${allChecked ? 'checked' : ''}></th>`;
  }
  for (const col of visCols) {
    const isActive = col.key === sortColumn;
    const arrow = isActive ? `<span class="sort-arrow">${sortOrder === 'asc' ? '\u25B2' : '\u25BC'}</span>` : '';
    theadHtml += `<th class="${isActive ? 'sorted' : ''}" data-col="${col.key}">${col.label}${arrow}</th>`;
  }
  theadHtml += '</tr>';

  main.innerHTML = `<table class="collection-table"><thead>${theadHtml}<tr id="vscroll-top" class="vscroll-spacer"><td colspan="${colCount}" style="height:0;padding:0;border:none"></td></tr></thead><tbody id="vtbody"></tbody><tfoot><tr id="vscroll-bottom" class="vscroll-spacer"><td colspan="${colCount}" style="height:${totalRows * rowHeight}px;padding:0;border:none"></td></tr></tfoot></table>`;

  const table = main.querySelector('.collection-table');
  const tbody = document.getElementById('vtbody');
  const topSpacer = document.getElementById('vscroll-top');
  const bottomSpacer = document.getElementById('vscroll-bottom');
  let renderedRange = [-1, -1];

  function buildRowHtml(idx) {
    const card = allCards[idx];
    const helpers = prepareCardHelpers(card, { isWanted: isCardWanted });
    const isSelected = selectedCards.has(idx);
    const isUnowned = card.owned === false;
    const isWanted = isCardWanted(card);
    const isOrdered = card.status === 'ordered';
    const trClasses = [isSelected ? 'selected' : '', isUnowned ? 'unowned' : '', isUnowned && isWanted ? 'wanted' : '', isOrdered ? 'ordered' : ''].filter(Boolean).join(' ');
    let h = `<tr data-idx="${idx}"${trClasses ? ` class="${trClasses}"` : ''}>`;
    if (multiSelectMode) {
      h += `<td class="select-col"><input type="checkbox" class="row-sel-cb" data-idx="${idx}" ${isSelected ? 'checked' : ''}></td>`;
    }
    for (const col of visCols) {
      const cls = col.key === 'price' || col.key === 'ck_price' || col.key === 'tcg_price' ? ' class="price-cell"' : '';
      h += `<td${cls} data-col="${col.key}">${renderCellContent(col.key, card, helpers, _cellOpts)}</td>`;
    }
    h += '</tr>';
    return h;
  }

  function htmlToRows(html) {
    const t = document.createElement('table');
    t.innerHTML = '<tbody>' + html + '</tbody>';
    return t.querySelector('tbody').children;
  }

  function renderVisibleRows() {
    const tableRect = table.getBoundingClientRect();
    const headerRow = table.querySelector('thead > tr:not(.vscroll-spacer)');
    const headerHeight = headerRow ? headerRow.offsetHeight : 0;
    const offset = -(tableRect.top - headerHeight);
    const viewportHeight = window.innerHeight;

    const firstRow = Math.max(0, Math.floor(offset / rowHeight) - bufferRows);
    const lastRow = Math.min(totalRows - 1, Math.ceil((offset + viewportHeight) / rowHeight) + bufferRows);

    if (firstRow === renderedRange[0] && lastRow === renderedRange[1]) return;
    const [pf, pl] = renderedRange;
    renderedRange = [firstRow, lastRow];

    // First render or non-overlapping range: full rebuild
    if (pf === -1 || firstRow > pl || lastRow < pf) {
      let html = '';
      for (let i = firstRow; i <= lastRow; i++) html += buildRowHtml(i);
      const rows = htmlToRows(html);
      tbody.innerHTML = '';
      while (rows.length) tbody.appendChild(rows[0]);
    } else {
      // Incremental: remove rows outside new range
      for (const tr of [...tbody.children]) {
        const idx = +tr.dataset.idx;
        if (idx < firstRow || idx > lastRow) tr.remove();
      }
      // Add new rows at top (scrolled up)
      if (firstRow < pf) {
        let html = '';
        for (let i = firstRow; i < pf; i++) html += buildRowHtml(i);
        const rows = htmlToRows(html);
        const ref = tbody.firstChild;
        while (rows.length) tbody.insertBefore(rows[0], ref);
      }
      // Add new rows at bottom (scrolled down)
      if (lastRow > pl) {
        let html = '';
        for (let i = pl + 1; i <= lastRow; i++) html += buildRowHtml(i);
        const rows = htmlToRows(html);
        while (rows.length) tbody.appendChild(rows[0]);
      }
    }

    // Update spacer heights
    topSpacer.firstChild.style.height = firstRow * rowHeight + 'px';
    bottomSpacer.firstChild.style.height = Math.max(0, (totalRows - lastRow - 1) * rowHeight) + 'px';

    // Measure actual row height after first render
    if (pf === -1) {
      const sample = tbody.querySelector('tr[data-idx]');
      if (sample) rowHeight = sample.offsetHeight || rowHeight;
    }
  }

  renderVisibleRows();

  if (savedScrollX) window.scrollTo(savedScrollX, window.scrollY);

  let ticking = false;
  function onScroll() {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(() => { renderVisibleRows(); ticking = false; });
    }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  _tableScrollCleanup = () => window.removeEventListener('scroll', onScroll);

  // Delegated click handler for checkboxes, filterable elements and row->modal
  table.addEventListener('click', (e) => {
    if (e.target.classList.contains('sel-all-cb')) {
      if (e.target.checked) {
        for (let i = 0; i < allCards.length; i++) selectedCards.add(i);
      } else {
        selectedCards.clear();
      }
      updateSelectionBar();
      render();
      return;
    }
    if (e.target.classList.contains('row-sel-cb')) {
      const idx = parseInt(e.target.dataset.idx);
      toggleCardSelection(idx, e.shiftKey);
      if (e.shiftKey) { render(); return; }
      e.target.closest('tr').classList.toggle('selected', selectedCards.has(idx));
      const allCb = main.querySelector('.sel-all-cb');
      if (allCb) allCb.checked = selectedCards.size === allCards.length;
      return;
    }
    if (e.target.closest('a')) return;
    const filterEl = e.target.closest('[data-filter-type]');
    if (filterEl) {
      e.stopPropagation();
      applyFilterViaSearch(filterEl.dataset.filterType, filterEl.dataset.filterValue);
      return;
    }
    const tr = e.target.closest('tr[data-idx]');
    if (tr) showCardModal(allCards[parseInt(tr.dataset.idx)]);
  });

  main.querySelectorAll('.collection-table th[data-col]').forEach(th => {
    th.addEventListener('click', () => handleSortClick(th.dataset.col));
  });
}

// Virtual-scroll state
let _tableScrollCleanup = null;
let _gridScrollCleanup = null;

function _buildCardHtml(card, idx) {
  const isUnowned = card.owned === false;
  const isWanted = isUnowned && isCardWanted(card);
  const isOrdered = card.status === 'ordered';
  const cls = 'sheet-card' + (isUnowned ? ' unowned' : '') + (isWanted ? ' wanted' : '') + (isOrdered ? ' ordered' : '');
  const rarityColor = getRarityColor(card.rarity);
  const foilClass = (!isUnowned && (card.finish === 'foil' || card.finish === 'etched')) ? ' foil' : '';
  const qtyBadge = !isUnowned && card.qty > 1 ? `<span class="qty-badge">${card.qty}x</span>` : '';
  const wantedBadge = isWanted ? '<span class="wanted-badge">Want</span>' : '';
  const orderedBadge = isOrdered ? '<span class="ordered-badge" title="Ordered"></span>' : '';
  const selectCb = multiSelectMode ? `<input type="checkbox" class="select-checkbox" data-idx="${idx}" ${selectedCards.has(idx) ? 'checked' : ''}>` : '';
  return `<div class="${cls}" data-idx="${idx}"><div class="sheet-card-img-wrap${foilClass}" style="--rarity-color:${rarityColor};--set-color:#111"><img src="${card.image_uri || ''}" alt="${card.name}" loading="lazy">${qtyBadge}${wantedBadge}${orderedBadge}${selectCb}</div></div>`;
}

function renderGrid() {
  // Clean up previous scroll listener
  if (_gridScrollCleanup) { _gridScrollCleanup(); _gridScrollCleanup = null; }

  if (allCards.length === 0) {
    main.innerHTML = '<div class="empty-state">No cards found</div>';
    return;
  }

  // Sort bar (batch innerHTML)
  let sortBarHtml = '';
  for (const col of ALL_COLUMNS) {
    const active = col.key === sortColumn ? ' active' : '';
    const arrow = col.key === sortColumn ? ` ${sortOrder === 'asc' ? '\u25B2' : '\u25BC'}` : '';
    sortBarHtml += `<span class="sort-btn${active}" data-sort="${col.key}">${col.label}${arrow}</span>`;
  }

  // Grid dimensions for virtual scrolling
  const gap = 10;
  const viewportWidth = main.clientWidth || window.innerWidth;
  const cols = gridCols;
  const cardWidth = Math.floor((viewportWidth - (cols - 1) * gap) / cols);
  const cardHeight = Math.round(cardWidth * (680 / 488)) + gap; // aspect ratio + gap
  const totalRows = Math.ceil(allCards.length / cols);
  const totalHeight = totalRows * cardHeight;
  const bufferRows = 3;

  // Create container with full height spacer for scroll
  main.innerHTML = `<div class="sort-bar" id="grid-sort-bar">${sortBarHtml}</div><div class="card-grid" id="vgrid" style="position:relative;height:${totalHeight}px;"></div>`;

  const gridEl = document.getElementById('vgrid');
  let renderedRange = [-1, -1]; // track what's currently rendered

  function renderVisible() {
    const scrollTop = window.scrollY - (gridEl.getBoundingClientRect().top + window.scrollY);
    const viewportHeight = window.innerHeight;
    const firstRow = Math.max(0, Math.floor(scrollTop / cardHeight) - bufferRows);
    const lastRow = Math.min(totalRows - 1, Math.ceil((scrollTop + viewportHeight) / cardHeight) + bufferRows);

    if (firstRow === renderedRange[0] && lastRow === renderedRange[1]) return;
    renderedRange = [firstRow, lastRow];

    const startIdx = firstRow * cols;
    const endIdx = Math.min(allCards.length, (lastRow + 1) * cols);
    let html = '';
    for (let idx = startIdx; idx < endIdx; idx++) {
      html += _buildCardHtml(allCards[idx], idx);
    }

    // Position cards absolutely within the grid
    gridEl.innerHTML = html;
    const cards = gridEl.children;
    for (let i = 0; i < cards.length; i++) {
      const idx = startIdx + i;
      const row = Math.floor(idx / cols);
      const col = idx % cols;
      cards[i].style.cssText = `position:absolute;top:${row * cardHeight}px;left:${col * (cardWidth + gap)}px;width:${cardWidth}px;`;
    }
  }

  renderVisible();

  // Scroll listener with requestAnimationFrame throttle
  let ticking = false;
  function onScroll() {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(() => { renderVisible(); ticking = false; });
    }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  _gridScrollCleanup = () => window.removeEventListener('scroll', onScroll);

  // Delegated event listeners on sort bar
  document.getElementById('grid-sort-bar').addEventListener('click', (e) => {
    const btn = e.target.closest('.sort-btn');
    if (btn) handleSortClick(btn.dataset.sort);
  });

  // Delegated event listener on grid
  gridEl.addEventListener('click', (e) => {
    if (e.target.classList.contains('select-checkbox')) {
      const idx = parseInt(e.target.dataset.idx);
      toggleCardSelection(idx, e.shiftKey);
      if (e.shiftKey) render();
      return;
    }
    const cardEl = e.target.closest('.sheet-card');
    if (cardEl) showCardModal(allCards[parseInt(cardEl.dataset.idx)]);
  });
}

function acLoadDynamic() {
  if (acSets) return;
  acSets = []; acDecks = []; acBinders = [];
  fetch('/api/cached-sets').then(r=>r.json()).then(d => { acSets = d; }).catch(()=>{});
  fetch('/api/decks').then(r=>r.json()).then(d => { acDecks = d; }).catch(()=>{});
  fetch('/api/binders').then(r=>r.json()).then(d => { acBinders = d; }).catch(()=>{});
}

function acGetCurrentToken() {
  const val = searchInput.value;
  const pos = searchInput.selectionStart || val.length;
  // Walk backward from cursor to find token start
  let start = pos;
  while (start > 0 && val[start-1] !== ' ') start--;
  const token = val.substring(start, pos);
  return {token, start, end: pos};
}

function acUpdate() {
  const {token} = acGetCurrentToken();
  if (!token) { acHide(); return; }

  acItems = [];
  const lower = token.toLowerCase();

  // Check if we're after a keyword prefix (e.g. "s:" or "is:")
  const colonIdx = token.indexOf(':');
  if (colonIdx >= 0) {
    const prefix = token.substring(0, colonIdx + 1).toLowerCase();
    const valPart = token.substring(colonIdx + 1).toLowerCase();

    // Static value completions
    let pool = AC_VALUES[prefix];
    if (pool) {
      for (const v of pool) {
        if (v.startsWith(valPart) && v !== valPart) {
          acItems.push({text: prefix + v, label: v, hint: '', cat: ''});
        }
      }
    }
    // Dynamic: set codes
    if (prefix === 's:' && acSets) {
      for (const s of acSets) {
        const code = s.code.toLowerCase();
        const name = (s.name||'').toLowerCase();
        if ((code.startsWith(valPart) || name.includes(valPart)) && code !== valPart) {
          acItems.push({text: 's:' + code, label: code.toUpperCase(), hint: s.name, cat: ''});
        }
        if (acItems.length >= 12) break;
      }
    }
    // Dynamic: deck names
    if (prefix === 'deck:' && acDecks) {
      acItems.push({text: 'deck:*', label: '*', hint: 'Any deck', cat: ''});
      for (const d of acDecks) {
        const name = (d.name||'');
        if (name.toLowerCase().includes(valPart)) {
          const q = name.includes(' ') ? `deck:"${name}"` : `deck:${name}`;
          acItems.push({text: q, label: name, hint: '', cat: ''});
        }
        if (acItems.length >= 12) break;
      }
    }
    // Dynamic: binder names
    if (prefix === 'binder:' && acBinders) {
      acItems.push({text: 'binder:*', label: '*', hint: 'Any binder', cat: ''});
      for (const b of acBinders) {
        const name = (b.name||'');
        if (name.toLowerCase().includes(valPart)) {
          const q = name.includes(' ') ? `binder:"${name}"` : `binder:${name}`;
          acItems.push({text: q, label: name, hint: '', cat: ''});
        }
        if (acItems.length >= 12) break;
      }
    }
  } else {
    // Keyword suggestions
    for (const kw of AC_KEYWORDS) {
      if (kw.k.startsWith(lower) && kw.k !== lower) {
        acItems.push({text: kw.k, label: kw.label, hint: kw.hint, cat: kw.cat});
      }
    }
    // Also suggest negation
    if (lower === '-') {
      acItems.push({text: '-', label: '-...', hint: 'Negate next term', cat: ''});
    }
  }

  if (acItems.length > 15) acItems.length = 15;
  if (acItems.length === 0) { acHide(); return; }
  acIdx = -1;
  acRender();
}

function acRender() {
  acDropdown.innerHTML = acItems.map((item, i) =>
    `<div class="ac-item${i===acIdx?' active':''}" data-i="${i}">` +
    `<span class="ac-label">${esc(item.label)}</span>` +
    (item.hint ? `<span class="ac-hint">${esc(item.hint)}</span>` : '') +
    (item.cat ? `<span class="ac-cat">${esc(item.cat)}</span>` : '') +
    `</div>`
  ).join('');
  acDropdown.classList.add('open');
}

function acHide() {
  acDropdown.classList.remove('open');
  acItems = [];
  acIdx = -1;
}

function acAccept(idx) {
  const item = acItems[idx >= 0 ? idx : 0];
  if (!item) return;
  const {start, end} = acGetCurrentToken();
  const val = searchInput.value;
  const before = val.substring(0, start);
  const after = val.substring(end);
  // Add trailing space unless the completion ends with : (expecting value)
  const suffix = item.text.endsWith(':') ? '' : ' ';
  searchInput.value = before + item.text + suffix + after;
  const newPos = start + item.text.length + suffix.length;
  searchInput.setSelectionRange(newPos, newPos);
  searchInput.focus();
  acHide();
  // If we inserted a full keyword:value, trigger fetch
  if (suffix === ' ') {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(fetchCollection, 300);
  } else {
    acUpdate();
  }
}

searchInput.addEventListener('keydown', (e) => {
  if (!acDropdown.classList.contains('open')) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIdx = Math.min(acIdx + 1, acItems.length - 1);
    acRender();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIdx = Math.max(acIdx - 1, -1);
    acRender();
  } else if (e.key === 'Tab' || e.key === 'Enter') {
    if (acIdx >= 0) {
      e.preventDefault();
      acAccept(acIdx);
    } else if (acItems.length > 0 && e.key === 'Tab') {
      e.preventDefault();
      acAccept(0);
    }
    // Enter with no selection: let it fall through to default (fetch)
  } else if (e.key === 'Escape') {
    acHide();
  }
});

acDropdown.addEventListener('mousedown', (e) => {
  e.preventDefault(); // Don't blur search input
  const item = e.target.closest('.ac-item');
  if (item) acAccept(parseInt(item.dataset.i));
});

  wishlistByOracle = {};

}


function renderWishlistPanel() {
  const list = document.getElementById('wishlist-panel-list');
  const entries = Object.values(wishlistMap);
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding:16px">Wishlist is empty</div>';

  panel.classList.toggle('open', open);

}

document.getElementById('wishlist-panel-list').addEventListener('click', async (e) => {
  const removeBtn = e.target.closest('.wl-remove');
  const entryEl = e.target.closest('.wl-entry');
  if (!entryEl) return;

  if (removeBtn) {
    // Remove from wishlist
    const wlId = parseInt(entryEl.dataset.wlId);
    await fetch(`/api/wishlist/${wlId}`, { method: 'DELETE' });
    const wl = wishlistMap[wlId];
    if (wl) _removeWishlistEntry(wl);
    updateWishlistCount();
    renderWishlistPanel();
    return;
  }

  // Click on entry name — open card modal
  const printingId = entryEl.dataset.printingId;
  if (!printingId) return;
  const card = allCards.find(c => c.printing_id === printingId);
  if (card) {
    toggleWishlistPanel(false);
    showCardModal(card);
  } else {
    // Card not in current view — fetch from API
    const res = await fetch(`/api/card/${printingId}`);
    if (res.ok) {
      const cardData = await res.json();
      toggleWishlistPanel(false);
      showCardModal(cardData);
    }
  }
});

// --- Cart text builders ---
function buildCKList(cards) {
  return cards.map(c => `1 ${(c.name || '').split(' // ')[0]}`).join('\n');
}

function buildTCGList(cards) {
  return cards.map(c => {
    const name = (c.name || '').split(' // ')[0];
    if (c.set_code && c.collector_number) {
      return `1 ${name} [${c.set_code.toUpperCase()}] ${c.collector_number}`;
    }
    return `1 ${name}`;
  }).join('\n');
}

async function copyAndOpen(text, url) {
  await navigator.clipboard.writeText(text);
  window.open(url, '_blank');
}

async function loadContainerData() {

  ]);
  allDecks = await decksRes.json();
  allBinders = await bindersRes.json();
  allViews = await viewsRes.json();
  populateViewSelect();
}

function populateViewSelect() {
  const sel = document.getElementById('view-select');
  while (sel.options.length > 1) sel.remove(1);
  allViews.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.id;
    opt.textContent = v.name;
    sel.appendChild(opt);
  });
}

document.getElementById('view-select').addEventListener('change', async function() {
  const vid = this.value;
  if (!vid) return;
  const res = await fetch(`/api/views/${vid}`);
  const view = await res.json();
  if (view.filters_json) {
    try {
      const f = typeof view.filters_json === 'string' ? JSON.parse(view.filters_json) : view.filters_json;
      searchInput.value = f.q || '';
      fetchCollection();
    } catch {}
  }
});

async function saveCurrentView() {
  const name = prompt('Name for this view:');
  if (!name) return;
  const filters = { q: searchInput.value };
  await fetch('/api/views', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name, filters_json: JSON.stringify(filters) }),
  });
  await loadContainerData();
}

async function showAssignDeckModal() {
  if (selectedCards.size === 0) return;
  const sel = document.getElementById('assign-deck-select');
  sel.innerHTML = '';
  if (allDecks.length === 0) { await loadContainerData(); }
  allDecks.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.name;
    sel.appendChild(opt);
  });
  const newOpt = document.createElement('option');
  newOpt.value = '__new__';
  newOpt.textContent = 'New Deck...';
  sel.appendChild(newOpt);
  document.getElementById('assign-deck-overlay').style.display = 'flex';
}

async function showAssignBinderModal() {
  if (selectedCards.size === 0) return;
  const sel = document.getElementById('assign-binder-select');
  sel.innerHTML = '';
  if (allBinders.length === 0) { await loadContainerData(); }
  allBinders.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.id;
    opt.textContent = b.name;
    sel.appendChild(opt);
  });
  const newOpt = document.createElement('option');
  newOpt.value = '__new__';
  newOpt.textContent = 'New Binder...';
  sel.appendChild(newOpt);
  document.getElementById('assign-binder-overlay').style.display = 'flex';
}

async function getSelectedCollectionIds() {
  const ids = [];
  for (const idx of selectedCards) {
    const card = allCards[idx];
    if (!card) continue;
    if (card.collection_id) {
      ids.push(card.collection_id);
    } else {
      const res = await fetch(`/api/collection/copies?printing_id=${card.printing_id}&finish=${card.finish}`);
      const copies = await res.json();
      for (const copy of copies) {
        if (!copy.deck_id && !copy.binder_id) ids.push(copy.id);
      }
    }
  }
  return ids;
}

async function assignSelectedToDeck() {
  let deckId = document.getElementById('assign-deck-select').value;
  const zone = document.getElementById('assign-deck-zone').value;
  if (deckId === '__new__') {
    const name = prompt('New deck name:');
    if (!name) return;
    const cr = await fetch('/api/decks', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name }) });
    const created = await cr.json();
    if (created.error) { alert(created.error); return; }
    deckId = created.id;
  }
  const ids = await getSelectedCollectionIds();
  if (ids.length === 0) { alert('No unassigned copies found'); return; }
  const res = await fetch(`/api/decks/${deckId}/cards`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ collection_ids: ids, zone }),
  });
  const result = await res.json();
  document.getElementById('assign-deck-overlay').style.display = 'none';
  if (result.error) { alert(result.error); return; }
  fetchCollection();
  loadContainerData();
}

async function assignSelectedToBinder() {
  let binderId = document.getElementById('assign-binder-select').value;
  if (binderId === '__new__') {
    const name = prompt('New binder name:');
    if (!name) return;
    const cr = await fetch('/api/binders', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name }) });
    const created = await cr.json();

  const res = await fetch(`/api/binders/${binderId}/cards`, {

    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ collection_ids: ids }),

  const result = await res.json();
  document.getElementById('assign-binder-overlay').style.display = 'none';
  if (result.error) { alert(result.error); return; }
  fetchCollection();
  loadContainerData();
}

// --- URL filter persistence ---
function serializeFiltersToURL() {
  const params = new URLSearchParams();

  if (_sharedCards) { params.set('cards', _sharedCards); params.set('view', 'grid'); }

  const q = searchInput.value.trim();
  if (q) params.set('q', q);

  if (sortColumn !== 'name') params.set('sort', sortColumn);
  if (sortOrder !== 'asc') params.set('sort_dir', sortOrder);
  if (currentView !== 'table') params.set('view', currentView);

  const qs = params.toString();
  history.replaceState(null, '', qs ? `?${qs}` : window.location.pathname);
}

let _sharedCards = '';  // ?cards=set:cn,set:cn,... for shareable links

function restoreFiltersFromURL() {
  const params = new URLSearchParams(window.location.search);
  if (!params.toString()) return;

  // Shared card list — takes precedence, forces grid view
  const cards = params.get('cards');
  if (cards) {
    _sharedCards = cards;
    currentView = 'grid';
    updateViewButtons();
  }

  // Search query
  const q = params.get('q');
  if (q) searchInput.value = q;

  // Sort
  if (params.get('sort')) sortColumn = params.get('sort');
  if (params.get('sort_dir') === 'desc') sortOrder = 'desc';

  // View
  const view = params.get('view');
  if (view === 'grid') {
    currentView = view;
    updateViewButtons();
  }
}

// --- Init ---
(async () => {
  const [settingsRes, _] = await Promise.all([
    fetch('/api/settings'),
    loadWishlist(),
  ]);
  _settings = await settingsRes.json();
  applySettings();
  restoreFiltersFromURL();
  fetchCollection();
  await loadContainerData();
})();
