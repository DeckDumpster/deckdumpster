# Scenario: Collection filters persist in the URL across page refresh
#
# Related:
#   issues: []
#   pull_requests: []

description: >
  When I apply filters on the Collection page — selecting the "rare" rarity
  checkbox and sorting by price descending — the URL updates to include query
  parameters. When I navigate to that URL directly, the rarity checkbox is
  checked, the table is sorted by price descending, and only rare cards are
  displayed. The filter state is fully restored from the URL.
