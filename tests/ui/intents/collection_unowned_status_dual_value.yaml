# Scenario: Unowned mode status text shows both owned and total values
#
# Related:
#   issues: []
#   pull_requests: []

description: >
  When I enable "View Unowned" mode on the Collection page with a set filter
  active, the status bar shows two dollar values: the owned value and the
  total value. The format includes "owned" and "total" labels, and the count
  shows how many cards are owned versus missing. The total value treats each
  missing card as one copy for pricing purposes.
