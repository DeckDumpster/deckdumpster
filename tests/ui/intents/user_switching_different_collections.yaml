# Scenario: Multi-user collection isolation with write operations
#
# Related:
#   pull_requests: [229]
#
# Prerequisites:
#   Multi-user mode activated by creating users via the API.
#   Default user has demo data (43 cards), new users start empty.

description: >
  When I switch between users, each user's collection, decks, and other
  data are fully isolated. Adding cards to one user doesn't affect another.
  Deleting a card from one user doesn't remove it from others. Creating a
  deck for one user doesn't leak to another. Switching back to the original
  user shows the same data as before (minus any explicit changes).
