# Scenario: Clearing all filters resets the URL to a clean path
#
# Related:
#   issues: []
#   pull_requests: []

description: >
  When I apply filters on the Collection page (a rarity filter and a search
  query) and then click the "Clear Filters" button, all filter controls
  reset to their defaults and the full unfiltered card list is displayed.
  The URL no longer contains any query parameters.
