# Scenario: Clicking an alternate printing swaps it in the deck
#
# Related:
#   pull_requests: [231]
#
# Prerequisites:
#   An idea deck with at least one card that has multiple printings in the DB.

description: >
  In the swap printing modal, I click on a different printing of the same
  card. The modal closes, the deck reloads with the new printing. The card
  row in list view now references the new set/collector number. If I reopen
  the swap modal for that card, the new printing shows the "Current" badge.
