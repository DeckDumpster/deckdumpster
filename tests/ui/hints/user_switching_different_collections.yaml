start_page: /collection
involves:
  - "User switcher dropdown (#user-switcher-btn)"
  - "Collection status text (#status) showing entry/card counts"
  - "POST /api/collection to add cards"
  - "POST /api/collection/bulk-delete to remove cards"
  - "POST /api/decks to create decks"
  - "GET /api/collection, /api/decks to verify isolation"
fixture_data:
  default_user_cards: "43"
  card_set: "fdn"
  card_cn: "132"
notes: >
  1. Create alice and bob users via API.
  2. Verify default has demo data, alice/bob are empty.
  3. Add 2 cards to alice via POST /api/collection.
  4. Switch back to default, verify status text unchanged.
  5. Delete a card from default, verify count decremented.
  6. Switch to alice, verify her 2 cards untouched.
  7. Verify bob still empty.
  8. Create deck for alice, verify bob can't see it.
